apiVersion: asset.sap/v1
kind: Asset

metadata:
  name: btp-usage-agent
  version: 1.0.0

type: agent

container:
  buildPath: .
  port: 5001

agentCard:
  name: BTP Usage Agent
  version: 1.0.0
  description: >
    Monitors SAP BTP account usage, costs, and entitlements across subaccounts.
    Ask questions like "What are my top services by cost this month?" or
    "Which subaccounts are near their entitlement limits?"
  capabilities:
    streaming: false
    pushNotifications: false
    stateTransitionHistory: false
  defaultInputModes:
    - text/plain
  defaultOutputModes:
    - text/plain
  skills:
    - id: btp-usage-query
      name: BTP Usage Query
      description: Query BTP service consumption and cost data for a subaccount or globally
    - id: entitlement-check
      name: Entitlement Check
      description: Check entitlement utilization and flag quota gaps across subaccounts
    - id: cost-breakdown
      name: Cost Breakdown
      description: Break down BTP costs by service, plan, and subaccount for a given month
  authentication:
    schemes:
      - bearer

probes:
  startup:
    path: /.well-known/agent.json
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 18
  liveness:
    path: /.well-known/agent.json
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /.well-known/agent.json
    initialDelaySeconds: 5
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
