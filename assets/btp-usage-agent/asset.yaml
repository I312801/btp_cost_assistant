apiVersion: asset.sap/v1
kind: Asset

metadata:
  name: btp-usage-agent
  version: 1.0.2

type: agent

agentCard:
  name: BTP Cost & Usage Intelligence Agent
  version: 1.0.2
  description: >
    Answers natural-language questions about SAP BTP account usage and cost
    by calling the BTP Usage Data Management Service APIs. Supports queries
    such as "show me subaccount usage this week", "what did we spend last
    month?", or "show monthly global account cost for May 2026".
  capabilities:
    skills:
      - name: btp-usage-query
        description: >
          Query SAP BTP subaccount or global account usage and cost data
          for a given time period using natural language.
  authentication:
    type: bearer
  supportedContentTypes:
    - application/json
  streaming:
    enabled: false

container:
  buildPath: .
  port: 5001
  env:
    # LLM backend: Joule integrates AI Core internally — no separate AICORE_* vars needed
    - name: LLM_BACKEND
      value: joule
    - name: JOULE_MODEL
      value: gpt-4o
    # BTP Usage Data Management Service credentials
    - name: BTP_UAS_URL
      secretRef:
        name: cred-customer-agent
        key: BTP_UAS_URL
    - name: BTP_AUTH_URL
      secretRef:
        name: cred-customer-agent
        key: BTP_AUTH_URL
    - name: BTP_CLIENT_ID
      secretRef:
        name: cred-customer-agent
        key: BTP_CLIENT_ID
    - name: BTP_CLIENT_SECRET
      secretRef:
        name: cred-customer-agent
        key: BTP_CLIENT_SECRET
    - name: BTP_SUBACCOUNT_ID
      secretRef:
        name: cred-customer-agent
        key: BTP_SUBACCOUNT_ID
    - name: BTP_GLOBAL_ACCOUNT_ID
      secretRef:
        name: cred-customer-agent
        key: BTP_GLOBAL_ACCOUNT_ID

probes:
  startup:
    path: /.well-known/agent.json
    initialDelaySeconds: 10
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30      # 30 × 10s = 5 min total startup window
  liveness:
    path: /.well-known/agent.json
    initialDelaySeconds: 60
    periodSeconds: 15
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    path: /.well-known/agent.json
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 6       # 30s + 60s = 90s total tolerance
